<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>Telefone (tel)</title>
</head>
<body>
    <h1>Link para telefone</h1>
    <p>Este exemplo mostra um hiperlink que, quando tocado, tenta iniciar uma chamada telefônica.</p>
    <p>O atributo href começa com tel: seguido do número no formato internacional (por exemplo +5511999999999).</p>
    <p>Ligar: <a href="tel:+5511999999999">+55 11 99999-9999</a></p>
</body>
</html>
