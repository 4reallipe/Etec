<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>Marcador sem href</title>
</head>
<body>
    <h1>Marcador sem href</h1>
    <p>Este exemplo mostra um elemento &lt;a&gt; sem atributo href, portanto não clicável como link.</p>
    <p>Ele pode ser usado como marcador para identificação em scripts futuros, mas por si só não navega.</p>
    <p><a id="marcador">Marcador sem href</a></p>
    <p>Este elemento não é clicável porque não possui href.</p>
</body>
</html>
